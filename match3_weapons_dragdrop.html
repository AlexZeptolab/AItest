<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Match-3 Weapons — Drag & Drop</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    touch-action: none;
    overscroll-behavior: none;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, #6b1e1e 0%, transparent 55%),
      linear-gradient(170deg, #1a0606 0%, #2a0a14 50%, #0a0210 100%);
    color:#fff;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding: 14px 12px 20px;
    position:relative;
  }
  body::before {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(circle at 15% 15%, rgba(255,80,80,.12), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(255,180,40,.10), transparent 45%);
    pointer-events:none;
  }
  body.shake { animation: shake .35s ease; }
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    20%     { transform: translate(-6px, 3px); }
    40%     { transform: translate(7px, -2px); }
    60%     { transform: translate(-5px, 4px); }
    80%     { transform: translate(4px, -3px); }
  }

  /* ─── Boss panel ─── */
  .boss-panel {
    width: min(92vw, 360px);
    background: linear-gradient(180deg, rgba(80,10,20,.7), rgba(20,5,10,.7));
    border: 1px solid rgba(255,90,90,.3);
    border-radius: 14px;
    padding: 10px 14px;
    position:relative;
    box-shadow: 0 6px 18px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .boss-row { display:flex; align-items:center; gap:12px; }
  .boss-face {
    font-size: 46px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.7));
    transition: transform .18s ease, filter .2s ease;
  }
  .boss-face.hit { animation: bosshit .35s ease; }
  @keyframes bosshit {
    0%   { transform: translateX(0) scale(1); filter: hue-rotate(0deg) brightness(1); }
    25%  { transform: translateX(-8px) scale(1.08); filter: hue-rotate(-40deg) brightness(2); }
    50%  { transform: translateX(7px)  scale(.95); filter: hue-rotate(0deg) brightness(1.4); }
    100% { transform: translateX(0) scale(1); filter: hue-rotate(0deg) brightness(1); }
  }
  .boss-info { flex:1; }
  .boss-name {
    font-size: 13px; font-weight: 800; letter-spacing: 1.2px;
    color: #ffb84d; text-transform: uppercase;
  }
  .boss-sub { font-size: 11px; opacity:.75; margin-bottom:6px; }
  .hp-track {
    width: 100%; height: 14px;
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 100px;
    overflow:hidden;
    position:relative;
  }
  .hp-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(180deg, #ff5b5b 0%, #c41a1a 100%);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.3);
    transition: width .55s cubic-bezier(.5,1.5,.5,1);
  }
  .hp-text {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size: 11px; font-weight: 800; letter-spacing: .5px;
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
  }
  .score-pill {
    position:absolute; top:-10px; right:10px;
    background: rgba(0,0,0,.6); border:1px solid rgba(255,216,77,.5);
    padding: 3px 10px; border-radius: 100px;
    font-size: 12px; font-weight: 800;
  }
  .score-pill .v { color:#ffd84d; }

  /* ─── Board ─── */
  .board-wrap { position:relative; }
  .board {
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: min(92vw, 360px);
    aspect-ratio: 1 / 1;
    background: rgba(0,0,0,.35);
    border: 2px solid rgba(255,150,80,.2);
    border-radius: 16px;
    padding: 8px;
    box-shadow: inset 0 4px 14px rgba(0,0,0,.55), 0 8px 24px rgba(0,0,0,.5);
    position: relative;
    overflow: hidden;
  }
  .cell {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 10px;
    display:flex; align-items:center; justify-content:center;
    font-size: clamp(22px, 7vw, 32px);
    transition: transform .25s cubic-bezier(.5, 1.6, .5, 1), opacity .25s;
    position: relative;
    will-change: transform;
  }
  .cell.hint {
    cursor: grab;
    box-shadow: 0 0 0 3px #ffb84d, 0 0 22px #ff8a30;
    background: rgba(255,184,77,.15);
    z-index: 2;
    animation: gem-pulse 1.2s ease-in-out infinite;
  }
  .cell.dragging { cursor: grabbing; transition: none !important; z-index: 5; }
  @keyframes gem-pulse {
    0%, 100% { box-shadow: 0 0 0 3px #ffb84d, 0 0 18px #ff8a30; }
    50%      { box-shadow: 0 0 0 4px #ffd84d, 0 0 32px #ffb84d; }
  }
  .cell.pop { animation: pop .55s ease forwards; }
  @keyframes pop {
    0%   { transform: scale(1) rotate(0); opacity:1; }
    35%  { transform: scale(1.45) rotate(15deg); }
    100% { transform: scale(0) rotate(40deg); opacity:0; }
  }

  /* ─── Swipe-arrow hint ─── */
  .swipe-arrow {
    position: absolute;
    width: 0; height: 0;
    pointer-events: none;
    z-index: 4;
    filter: drop-shadow(0 0 10px #ffb84d) drop-shadow(0 0 4px rgba(255,255,255,.6));
  }
  .swipe-arrow.swipe-down {
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 18px solid #ffd84d;
    margin-left: -12px; margin-top: 18px;
    animation: bounce-down 1s ease-in-out infinite;
  }
  .swipe-arrow.swipe-up {
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 18px solid #ffd84d;
    margin-left: -12px; margin-top: -36px;
    animation: bounce-up 1s ease-in-out infinite;
  }
  .swipe-arrow.swipe-left {
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-right: 18px solid #ffd84d;
    margin-left: -36px; margin-top: -12px;
    animation: bounce-left 1s ease-in-out infinite;
  }
  .swipe-arrow.swipe-right {
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-left: 18px solid #ffd84d;
    margin-left: 18px; margin-top: -12px;
    animation: bounce-right 1s ease-in-out infinite;
  }
  @keyframes bounce-down  { 0%,100% { transform: translateY(0);} 50% { transform: translateY(10px);} }
  @keyframes bounce-up    { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-10px);} }
  @keyframes bounce-left  { 0%,100% { transform: translateX(0);} 50% { transform: translateX(-10px);} }
  @keyframes bounce-right { 0%,100% { transform: translateX(0);} 50% { transform: translateX(10px);} }

  .ghost-finger {
    position: absolute;
    font-size: 30px;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.6));
  }

  .floater {
    position:absolute; pointer-events:none;
    font-weight:900; font-size: 30px;
    color:#ff5b5b; text-shadow:0 2px 0 #5a0606, 0 4px 8px rgba(0,0,0,.7);
    animation: floatUp 1.1s ease-out forwards;
    z-index: 6;
  }
  @keyframes floatUp {
    0%   { transform: translate(-50%, 0) scale(.6); opacity:0; }
    20%  { transform: translate(-50%, -10px) scale(1.2); opacity:1; }
    100% { transform: translate(-50%, -90px) scale(.9); opacity:0; }
  }

  .cta {
    width: min(92vw, 360px);
    background: linear-gradient(180deg, #ffb12b, #d6741e);
    color:#fff; font-weight:900; font-size:18px;
    border:none; border-radius:14px;
    padding: 16px;
    box-shadow: 0 4px 0 #8d3e0e, 0 8px 24px rgba(0,0,0,.55);
    cursor:pointer; letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 2px 0 rgba(0,0,0,.25);
  }
  .cta:active { transform: translateY(2px); box-shadow: 0 2px 0 #8d3e0e; }

  /* ─── End card ─── */
  .endcard {
    position:fixed; inset:0; z-index:10;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,184,77,.4), rgba(0,0,0,.94));
    display:none;
    align-items:center; justify-content:center; flex-direction:column;
    text-align:center; padding: 24px;
  }
  .endcard.show { display:flex; animation: fadein .35s ease; }
  @keyframes fadein { from{opacity:0;} to{opacity:1;} }
  .victory-icon { font-size: 84px; margin-bottom: 10px; animation: spinin .8s cubic-bezier(.5,2,.5,1) backwards; }
  @keyframes spinin { from{transform:scale(0) rotate(-360deg);opacity:0;} to{transform:scale(1) rotate(0);opacity:1;} }
  .stars { font-size: 38px; margin-bottom: 10px; }
  .star { display:inline-block; animation: starin .55s cubic-bezier(.5,2,.5,1) backwards; margin: 0 4px; }
  .star:nth-child(1){animation-delay:.3s;}
  .star:nth-child(2){animation-delay:.5s;}
  .star:nth-child(3){animation-delay:.7s;}
  @keyframes starin { from{transform:scale(0) rotate(-180deg); opacity:0;} to{transform:scale(1) rotate(0); opacity:1;} }
  .endcard h1 {
    font-size: 42px; font-weight:900; color:#ffb84d;
    text-shadow: 0 4px 0 #5a2406, 0 8px 22px rgba(0,0,0,.65);
    margin-bottom: 8px; letter-spacing: 2px;
  }
  .endcard p { font-size: 16px; opacity:.92; margin-bottom: 22px; max-width: 300px; line-height: 1.4; }
  .badge {
    display:inline-block;
    background: rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2);
    padding: 4px 12px; border-radius: 100px;
    font-size: 12px; opacity:.85;
    margin-top: 14px;
  }

  .helper {
    text-align:center; font-size: 12px; opacity: .7;
    margin-top: 6px; letter-spacing: .5px;
  }

  .mute-btn {
    position: fixed;
    top: 14px; right: 14px;
    width: 36px; height: 36px;
    background: rgba(0,0,0,.55);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 50%;
    color: #fff;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 20;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: transform .12s, background .12s;
  }
  .mute-btn:active { transform: scale(.92); }
  .mute-btn.muted { opacity: .55; }
</style>
</head>
<body>

  <button class="mute-btn" id="muteBtn" aria-label="Toggle sound">&#x1F50A;</button>

  <div class="boss-panel">
    <div class="score-pill">SCORE <span class="v" id="score">0</span></div>
    <div class="boss-row">
      <div class="boss-face" id="bossFace">&#x1F432;</div>
      <div class="boss-info">
        <div class="boss-name" id="bossName">Shadow Dragon</div>
        <div class="boss-sub" id="bossSub">Boss · Lv. 1</div>
        <div class="hp-track">
          <div class="hp-fill" id="hpFill"></div>
          <div class="hp-text" id="hpText">190 / 190</div>
        </div>
      </div>
    </div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
  <div class="helper" id="helper">Drag the glowing weapon in the arrow direction</div>

  <button class="cta" id="cta">▶ Play full game</button>

  <div class="endcard" id="endcard">
    <div class="victory-icon">&#x1F3C6;</div>
    <div class="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
    <h1>VICTORY!</h1>
    <p>You slayed the dragon. Unlock 50+ heroes, epic weapons & 500 levels in the full game.</p>
    <button class="cta" id="install">&#x1F4F2; Install now — free</button>
    <div class="badge">4.8 ★ · 10M+ players</div>
  </div>

<script>
(function(){
  // Weapon palette: 0=sword 1=bow 2=bomb 3=axe 4=gun
  const W = ['⚔️','\u{1F3F9}','\u{1F4A3}','\u{1FA93}','\u{1F52B}'];
  const MAX_HP = 190;

  let hp = MAX_HP;
  let score = 0;
  let stageIdx = 0;
  let busy = false;

  // Drag state
  let dragging = false;
  let dragStart = { x: 0, y: 0 };
  let dragDir = { dx: 0, dy: 0 };
  let cellStep = 0;
  let activeCell = null;
  let activeTarget = null;
  let activePointerId = null;

  // ─── Sound (Web Audio API, all tones synthesized at runtime, no files) ───
  let audioCtx = null;
  let muted = false;
  function ensureAudio(){
    if(muted) return null;
    if(!audioCtx){
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; return null; }
    }
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function tone(opts){
    const ctx = ensureAudio(); if(!ctx) return;
    const now = ctx.currentTime;
    const dur = opts.duration || 0.1;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = opts.type || 'sine';
    osc.frequency.setValueAtTime(opts.freq, now);
    if(opts.freq2 !== undefined){
      osc.frequency.exponentialRampToValueAtTime(Math.max(0.01, opts.freq2), now + dur);
    }
    const v = (opts.volume !== undefined ? opts.volume : 0.2);
    const atk = opts.attack !== undefined ? opts.attack : 0.005;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(v, now + atk);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.05);
  }

  function noise(opts){
    const ctx = ensureAudio(); if(!ctx) return;
    const now = ctx.currentTime;
    const dur = opts.duration || 0.1;
    const sr = ctx.sampleRate;
    const len = Math.floor(sr * dur);
    const buf = ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for(let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = opts.filterType || 'bandpass';
    filter.frequency.value = opts.freq || 800;
    filter.Q.value = opts.q !== undefined ? opts.q : 5;
    const gain = ctx.createGain();
    const v = opts.volume !== undefined ? opts.volume : 0.15;
    gain.gain.setValueAtTime(v, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start(now);
    src.stop(now + dur);
  }

  const SFX = {
    drag()   { tone({ freq: 220, freq2: 320, duration: 0.07, type: 'sine',     volume: 0.16 }); },
    bounce() { tone({ freq: 380, freq2: 200, duration: 0.12, type: 'triangle', volume: 0.18 }); },
    swap()   {
      tone({ freq: 380, freq2: 600, duration: 0.10, type: 'triangle', volume: 0.20 });
    },
    pop(i)   {
      const base = 700 + i * 120;
      tone({ freq: base, freq2: base * 0.5, duration: 0.10, type: 'square', volume: 0.14 });
      noise({ duration: 0.05, volume: 0.08, freq: 1400, q: 3 });
    },
    damage() {
      tone({ freq: 110, freq2: 55, duration: 0.18, type: 'square', volume: 0.28 });
      noise({ duration: 0.16, volume: 0.18, freq: 220, q: 1 });
    },
    land()   {
      tone({ freq: 160, freq2: 100, duration: 0.07, type: 'sine', volume: 0.14 });
      noise({ duration: 0.04, volume: 0.05, freq: 300, q: 2 });
    },
    coin()   { tone({ freq: 1320, duration: 0.04, type: 'square', volume: 0.07 }); },
    victory(){
      const notes = [523, 659, 784, 1047, 1568];
      notes.forEach((f, i) => {
        setTimeout(() => tone({ freq: f, duration: 0.18, type: 'triangle', volume: 0.22 }), i * 110);
      });
      setTimeout(() => {
        tone({ freq: 1568, duration: 0.45, type: 'triangle', volume: 0.26 });
        tone({ freq: 1047, duration: 0.45, type: 'triangle', volume: 0.18 });
      }, 600);
    },
  };

  // Mute toggle
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', function(){
    muted = !muted;
    muteBtn.classList.toggle('muted', muted);
    muteBtn.innerHTML = muted ? '&#x1F507;' : '&#x1F50A;';
    if(!muted) ensureAudio();
  });

  const stages = [
    {
      grid: [
        [1,2,3,4,0],
        [3,0,2,1,4],
        [0,2,0,3,1],
        [4,1,3,2,0],
        [2,3,4,1,2],
      ],
      hint: [1,1], swap: [2,1],
      matches: [[2,0],[2,1],[2,2]],
      damage: 30, points: 30,
      title: 'SHADOW DRAGON', sub: 'Boss · Lv. 1',
    },
    {
      grid: [
        [1,4,0,3,2],
        [3,0,2,1,4],
        [1,3,2,4,0],
        [4,1,0,2,3],
        [2,4,4,1,0],
      ],
      hint: [3,3], swap: [3,2],
      matches: [[1,2],[2,2],[3,2]],
      damage: 60, points: 60,
      title: 'SHADOW DRAGON', sub: 'Wounded — keep going!',
    },
    {
      grid: [
        [0,2,1,4,3],
        [2,4,0,1,2],
        [4,3,1,2,0],
        [3,0,3,3,1],
        [1,4,2,0,4],
      ],
      hint: [2,1], swap: [3,1],
      matches: [[3,0],[3,1],[3,2],[3,3]],
      damage: 100, points: 100,
      title: 'SHADOW DRAGON', sub: 'Critical — finish him!',
    },
  ];

  const boardEl    = document.getElementById('board');
  const boardWrap  = boardEl.parentElement;
  const scoreEl    = document.getElementById('score');
  const hpFillEl   = document.getElementById('hpFill');
  const hpTextEl   = document.getElementById('hpText');
  const bossFaceEl = document.getElementById('bossFace');
  const bossNameEl = document.getElementById('bossName');
  const bossSubEl  = document.getElementById('bossSub');
  const endcardEl  = document.getElementById('endcard');
  const ctaEl      = document.getElementById('cta');
  const installEl  = document.getElementById('install');

  function getCell(r, c){
    return boardEl.querySelector('[data-r="'+r+'"][data-c="'+c+'"]');
  }

  function renderBoard(){
    boardEl.innerHTML = '';
    const s = stages[stageIdx];
    bossNameEl.textContent = s.title;
    bossSubEl.textContent  = s.sub;
    for(let r = 0; r < 5; r++){
      for(let c = 0; c < 5; c++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = W[s.grid[r][c]];
        cell.dataset.r = r;
        cell.dataset.c = c;
        if(r === s.hint[0] && c === s.hint[1]){
          cell.classList.add('hint');
          cell.addEventListener('pointerdown', onPointerDown);
        }
        boardEl.appendChild(cell);
      }
    }
    showSwipeArrow();
  }

  // ─── Swipe arrow / ghost finger hint ───
  function showSwipeArrow(){
    hideSwipeArrow();
    const s = stages[stageIdx];
    const cell = getCell(s.hint[0], s.hint[1]);
    if(!cell) return;

    const cellRect = cell.getBoundingClientRect();
    const wrapRect = boardWrap.getBoundingClientRect();
    const cx = cellRect.left + cellRect.width / 2 - wrapRect.left;
    const cy = cellRect.top  + cellRect.height / 2 - wrapRect.top;

    const ddx = s.swap[1] - s.hint[1];
    const ddy = s.swap[0] - s.hint[0];
    const dirClass = ddy === 1 ? 'down' : ddy === -1 ? 'up' : ddx === 1 ? 'right' : 'left';

    const arrow = document.createElement('div');
    arrow.id = 'swipeArrow';
    arrow.className = 'swipe-arrow swipe-' + dirClass;
    arrow.style.left = cx + 'px';
    arrow.style.top  = cy + 'px';
    boardWrap.appendChild(arrow);
  }
  function hideSwipeArrow(){
    const a = document.getElementById('swipeArrow');
    if(a) a.remove();
  }

  // ─── Drag handlers ───
  function onPointerDown(e){
    if(busy || dragging) return;
    e.preventDefault();

    const s = stages[stageIdx];
    activeCell   = getCell(s.hint[0], s.hint[1]);
    activeTarget = getCell(s.swap[0], s.swap[1]);
    if(!activeCell || !activeTarget) return;

    dragging = true;
    activePointerId = e.pointerId;
    activeCell.setPointerCapture && activeCell.setPointerCapture(e.pointerId);

    activeCell.classList.remove('hint');
    activeCell.classList.add('dragging');
    activeTarget.style.transition = 'none';
    hideSwipeArrow();
    SFX.drag();

    dragStart = { x: e.clientX, y: e.clientY };
    cellStep  = activeCell.getBoundingClientRect().width + 6;
    dragDir   = { dx: s.swap[1] - s.hint[1], dy: s.swap[0] - s.hint[0] };

    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
    document.addEventListener('pointercancel', onPointerUp);
  }

  function onPointerMove(e){
    if(!dragging) return;
    e.preventDefault();
    let dx = e.clientX - dragStart.x;
    let dy = e.clientY - dragStart.y;

    // Constrain to swap axis, only allow movement in correct direction
    if(dragDir.dx !== 0){
      dy = 0;
      dx = dragDir.dx > 0
        ? Math.max(0, Math.min(cellStep, dx))
        : Math.min(0, Math.max(-cellStep, dx));
    } else {
      dx = 0;
      dy = dragDir.dy > 0
        ? Math.max(0, Math.min(cellStep, dy))
        : Math.min(0, Math.max(-cellStep, dy));
    }

    activeCell.style.transform   = 'translate(' + dx + 'px,' + dy + 'px)';
    activeTarget.style.transform = 'translate(' + (-dx) + 'px,' + (-dy) + 'px)';
  }

  function onPointerUp(e){
    if(!dragging) return;
    dragging = false;
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
    document.removeEventListener('pointercancel', onPointerUp);

    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    const moved = dragDir.dx !== 0 ? dx * dragDir.dx : dy * dragDir.dy;

    activeCell.style.transition = '';
    activeTarget.style.transition = '';
    activeCell.classList.remove('dragging');

    if(moved >= cellStep * 0.5){
      // Snap into place
      activeCell.style.transform   = 'translate(' + (dragDir.dx * cellStep) + 'px,' + (dragDir.dy * cellStep) + 'px)';
      activeTarget.style.transform = 'translate(' + (-dragDir.dx * cellStep) + 'px,' + (-dragDir.dy * cellStep) + 'px)';
      busy = true;
      SFX.swap();
      setTimeout(commitMatch, 220);
    } else {
      // Bounce back
      activeCell.style.transform = '';
      activeTarget.style.transform = '';
      activeCell.classList.add('hint');
      showSwipeArrow();
      SFX.bounce();
    }
  }

  // ─── Match resolution ───
  function commitMatch(){
    const s = stages[stageIdx];
    const a = activeCell;
    const b = activeTarget;

    // Logical swap, reset transforms
    const tmp = a.textContent;
    a.textContent = b.textContent;
    b.textContent = tmp;
    a.style.transform = '';
    b.style.transform = '';

    // Pop matched cells (with staggered chord-like SFX)
    s.matches.forEach(function(m, i){
      const cell = getCell(m[0], m[1]);
      if(cell) cell.classList.add('pop');
      setTimeout(function(){ SFX.pop(i); }, i * 55);
    });

    // Damage floater
    const float = document.createElement('div');
    float.className = 'floater';
    float.textContent = '-' + s.damage;
    const midM = s.matches[Math.floor(s.matches.length / 2)];
    const midCell = getCell(midM[0], midM[1]);
    const mr = midCell.getBoundingClientRect();
    const br = boardEl.getBoundingClientRect();
    float.style.left = (mr.left - br.left + mr.width / 2) + 'px';
    float.style.top  = (mr.top  - br.top  + mr.height / 2) + 'px';
    boardWrap.appendChild(float);
    setTimeout(function(){ float.remove(); }, 1100);

    damageBoss(s.damage);
    tweenScore(s.points);

    // After pop animation finishes, run gravity cascade
    setTimeout(function(){
      cascade(s.matches, function(){
        stageIdx++;
        if(stageIdx >= stages.length){
          setTimeout(showEndcard, 350);
        } else {
          // Brief pause so player sees the settled state, then load next stage
          setTimeout(function(){
            renderBoard();
            busy = false;
          }, 280);
        }
      });
    }, 580);
  }

  // ─── Gravity / cascade ───
  // After matches pop: gems above fall down, new gems spawn from above to fill the top.
  function cascade(matches, callback){
    const matchedSet = {};
    matches.forEach(function(m){ matchedSet[m[0] + ',' + m[1]] = true; });

    // Snapshot current grid contents from the DOM (matched cells become null).
    const current = [];
    for(let r = 0; r < 5; r++){
      const row = [];
      for(let c = 0; c < 5; c++){
        if(matchedSet[r + ',' + c]){
          row.push(null);
        } else {
          row.push(getCell(r, c).textContent);
        }
      }
      current.push(row);
    }

    const cellSize = getCell(0, 0).getBoundingClientRect().height + 6;

    // Build per-cell update list: where each cell's new content visually came from.
    const updates = [];
    for(let c = 0; c < 5; c++){
      const survivors = [];
      for(let r = 0; r < 5; r++){
        if(current[r][c] !== null){
          survivors.push({ gem: current[r][c], fromR: r });
        }
      }
      const empty = 5 - survivors.length;
      for(let r = 0; r < 5; r++){
        if(r < empty){
          // Brand-new gem entering from above the board
          const newGem = W[Math.floor(Math.random() * W.length)];
          updates.push({ r: r, c: c, content: newGem, fromR: r - empty });
        } else {
          const surv = survivors[r - empty];
          updates.push({ r: r, c: c, content: surv.gem, fromR: surv.fromR });
        }
      }
    }

    // Snap each cell to the visual position it's "falling from", with no transition.
    updates.forEach(function(u){
      const cell = getCell(u.r, u.c);
      cell.classList.remove('pop');
      cell.style.transition = 'none';
      cell.textContent = u.content;
      cell.style.opacity = '1';
      const fallDistance = (u.r - u.fromR) * cellSize; // ≥ 0
      cell.style.transform = 'translateY(' + (-fallDistance) + 'px)';
    });

    // Force reflow so the browser registers the "from" state before transitioning.
    void boardEl.offsetWidth;

    // Animate each cell to its real grid position. Stagger by row for a nicer feel.
    requestAnimationFrame(function(){
      let maxDistance = 0;
      updates.forEach(function(u){
        const cell = getCell(u.r, u.c);
        const distance = u.r - u.fromR; // how many rows it falls
        if(distance > maxDistance) maxDistance = distance;
        const dur = 0.32 + Math.min(distance, 5) * 0.06; // farther falls take longer
        cell.style.transition = 'transform ' + dur + 's cubic-bezier(0.45, 1.25, 0.55, 1)';
        cell.style.transform = '';
      });
      // Single landing thud when the farthest gem hits the floor
      if(maxDistance > 0){
        const landDur = (0.32 + Math.min(maxDistance, 5) * 0.06) * 1000;
        setTimeout(function(){ SFX.land(); }, landDur - 40);
      }
      setTimeout(callback, 600);
    });
  }

  function damageBoss(amount){
    hp = Math.max(0, hp - amount);
    hpFillEl.style.width = (hp / MAX_HP * 100) + '%';
    hpTextEl.textContent = hp + ' / ' + MAX_HP;
    SFX.damage();

    bossFaceEl.classList.remove('hit');
    void bossFaceEl.offsetWidth;
    bossFaceEl.classList.add('hit');

    document.body.classList.remove('shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');

    if (hp <= 0)              bossFaceEl.textContent = '\u{1F480}';
    else if (hp < MAX_HP*0.4) bossFaceEl.textContent = '\u{1F62B}';
    else if (hp < MAX_HP*0.8) bossFaceEl.textContent = '\u{1F621}';
  }

  function tweenScore(points){
    const startScore = score;
    const endScore   = score + points;
    const t0 = Date.now();
    const dur = 550;
    let lastTickAt = startScore;
    (function tick(){
      const t = Math.min(1, (Date.now() - t0) / dur);
      score = Math.floor(startScore + (endScore - startScore) * t);
      scoreEl.textContent = score;
      // Tick a coin sound every ~10 score points
      if(score - lastTickAt >= 10){
        SFX.coin();
        lastTickAt = score;
      }
      if(t < 1) requestAnimationFrame(tick);
    })();
  }

  function showEndcard(){
    endcardEl.classList.add('show');
    SFX.victory();
  }
  function fireCTA(){
    // In a real ad-network playable, replace with mraid.open(STORE_URL)
    alert('CTA pressed! In a real playable this opens the App Store / Google Play.');
  }

  ctaEl.addEventListener('click', fireCTA);
  installEl.addEventListener('click', fireCTA);

  // init
  hpFillEl.style.width = '100%';
  hpTextEl.textContent = MAX_HP + ' / ' + MAX_HP;
  renderBoard();

  // Re-position arrow on resize
  window.addEventListener('resize', function(){ if(!dragging) showSwipeArrow(); });
})();
</script>
</body>
</html>
